name: Build

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shell-syntax:
    name: Shell syntax
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate shell syntax
        run: bash -n create-release.sh scripts/*.sh build.sh build-rpm.sh linux-build/DEBIAN/postinst linux-build/DEBIAN/prerm linux-build/DEBIAN/postrm tests/*.sh

  incomplete-payload:
    name: Baseline incomplete payload behavior
    runs-on: ubuntu-latest
    needs: shell-syntax
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Debian build fails clearly without proprietary payload
        run: |
          set +e
          bash build.sh >debian-incomplete-payload.log 2>&1
          status=$?
          set -e
          cat debian-incomplete-payload.log
          test "${status}" -ne 0
          grep -F 'Cannot build Debian package; required payload files are missing or incomplete' debian-incomplete-payload.log
          grep -F 'Run scripts/assemble-linux-payload.sh' debian-incomplete-payload.log

      - name: RPM build fails clearly without proprietary payload
        run: |
          set +e
          bash build-rpm.sh >rpm-incomplete-payload.log 2>&1
          status=$?
          set -e
          cat rpm-incomplete-payload.log
          test "${status}" -ne 0
          grep -F 'RPM payload is incomplete; refusing to build a bogus package' rpm-incomplete-payload.log
          grep -F 'Run scripts/assemble-linux-payload.sh' rpm-incomplete-payload.log
