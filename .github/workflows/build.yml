name: Build

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      payload_path:
        description: 'Optional runner-local complete payload root to copy into linux-build/opt/minimax-hub before package builds.'
        required: false
        type: string
      runner_label:
        description: 'Optional runner label for payload-backed builds, for example self-hosted.'
        required: false
        default: ubuntu-latest
        type: string

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shell-syntax:
    name: Shell syntax
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate shell syntax
        run: bash -n scripts/*.sh build.sh build-rpm.sh tests/*.sh

  incomplete-payload:
    name: Baseline incomplete payload behavior
    runs-on: ubuntu-latest
    needs: shell-syntax
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Debian build fails clearly without proprietary payload
        run: |
          set +e
          bash build.sh >debian-incomplete-payload.log 2>&1
          status=$?
          set -e
          cat debian-incomplete-payload.log
          test "${status}" -ne 0
          grep -F 'Cannot build Debian package; required payload files are missing or incomplete' debian-incomplete-payload.log
          grep -F 'Run scripts/assemble-linux-payload.sh' debian-incomplete-payload.log

      - name: RPM build fails clearly without proprietary payload
        run: |
          set +e
          bash build-rpm.sh >rpm-incomplete-payload.log 2>&1
          status=$?
          set -e
          cat rpm-incomplete-payload.log
          test "${status}" -ne 0
          grep -F 'RPM payload is incomplete; refusing to build a bogus package' rpm-incomplete-payload.log
          grep -F 'Run scripts/assemble-linux-payload.sh' rpm-incomplete-payload.log

  deb-package:
    name: Debian package
    runs-on: ${{ inputs.runner_label || vars.MINIMAX_HUB_RUNNER_LABEL || 'ubuntu-latest' }}
    needs: incomplete-payload
    if: ${{ (inputs.payload_path || vars.MINIMAX_HUB_PAYLOAD_PATH || '') != '' }}
    env:
      PAYLOAD_PATH: ${{ inputs.payload_path || vars.MINIMAX_HUB_PAYLOAD_PATH }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Debian packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev rsync

      - name: Stage runner-local payload
        run: |
          test -n "${PAYLOAD_PATH}"
          test -d "${PAYLOAD_PATH}"
          rm -rf linux-build/opt/minimax-hub
          mkdir -p linux-build/opt/minimax-hub
          rsync -a --delete "${PAYLOAD_PATH%/}/" linux-build/opt/minimax-hub/
          bash tests/verify-payload.sh linux-build/opt/minimax-hub

      - name: Build and verify Debian package
        run: bash build.sh

      - name: Upload Debian artifact
        uses: actions/upload-artifact@v4
        with:
          name: minimax-hub-deb
          path: output/minimax-hub_*_amd64.deb
          if-no-files-found: error

  rpm-package:
    name: RPM package
    runs-on: ${{ inputs.runner_label || vars.MINIMAX_HUB_RUNNER_LABEL || 'ubuntu-latest' }}
    needs: incomplete-payload
    if: ${{ (inputs.payload_path || vars.MINIMAX_HUB_PAYLOAD_PATH || '') != '' }}
    env:
      PAYLOAD_PATH: ${{ inputs.payload_path || vars.MINIMAX_HUB_PAYLOAD_PATH }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build and verify RPM package in Rocky Linux
        run: |
          test -n "${PAYLOAD_PATH}"
          test -d "${PAYLOAD_PATH}"
          docker run --rm \
            -v "${PWD}:/work" \
            -v "${PAYLOAD_PATH}:/payload:ro" \
            rockylinux:9 \
            bash -lc "dnf install -y rpm-build rpm cpio rsync findutils && cd /work && rm -rf linux-build/opt/minimax-hub && mkdir -p linux-build/opt/minimax-hub && rsync -a --delete /payload/ linux-build/opt/minimax-hub/ && bash tests/verify-payload.sh linux-build/opt/minimax-hub && bash build-rpm.sh && bash tests/verify-rpm.sh"

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: minimax-hub-rpm
          path: output/minimax-hub-*-1*.x86_64.rpm
          if-no-files-found: error
